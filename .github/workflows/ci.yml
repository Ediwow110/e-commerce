name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (typecheck + unit + integration)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: luxe
          POSTGRES_PASSWORD: luxe
          POSTGRES_DB: luxe_test
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U luxe"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://luxe:luxe@localhost:5432/luxe_test?schema=public
      JWT_ACCESS_SECRET: ci-access-secret-32-chars-minimum-len
      JWT_REFRESH_SECRET: ci-refresh-secret-32-chars-different
      NODE_ENV: test
      PAYMENT_PROVIDER_DEFAULT: mock
      CORS_ORIGIN: http://localhost:5173
      PAYMENT_WEBHOOK_SECRET: ci-webhook-secret
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Apply migrations
        run: npx prisma migrate deploy

      - name: Typecheck (no emit)
        run: npm run typecheck

      - name: Production build
        run: npm run build

      - name: Run tests (unit + integration)
        run: npm test

  frontend:
    name: Frontend (typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Tests (passes if none defined)
        run: npx vitest run --passWithNoTests

  audit:
    name: Dependency audit (blocking, high+)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Backend audit
        working-directory: backend
        run: npm audit --audit-level=high --omit=dev

      - name: Frontend audit
        working-directory: frontend
        run: npm audit --audit-level=high --omit=dev
