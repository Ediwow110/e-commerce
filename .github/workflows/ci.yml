name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (lint + typecheck + tests + integration)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: luxe
          POSTGRES_PASSWORD: luxe
          POSTGRES_DB: luxe_test
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U luxe"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://luxe:luxe@localhost:5432/luxe_test?schema=public
      JWT_ACCESS_SECRET: ci-access-secret-32-chars-minimum-len
      JWT_REFRESH_SECRET: ci-refresh-secret-32-chars-different
      NODE_ENV: test
      PAYMENT_PROVIDER_DEFAULT: mock
      CORS_ORIGIN: http://localhost:5173
      PAYMENT_WEBHOOK_SECRET: ci-webhook-secret
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npx prisma generate
      - run: npx prisma migrate deploy
      - run: npx tsc --noEmit
      - run: npx tsc -p tsconfig.build.json
      - run: npx vitest run --reporter=default

  frontend:
    name: Frontend (typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run typecheck || npx tsc --noEmit
      - run: npm run build
