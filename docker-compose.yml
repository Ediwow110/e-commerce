services:
  postgres:
    image: postgres:16-alpine
    container_name: luxe-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: luxe_commerce
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - luxe_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: luxe-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
      PORT: 8080
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/luxe_commerce
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/health/ready || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3

  frontend:
    image: node:20-alpine
    container_name: luxe-frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: sh -c "npm ci && npm run build && npx serve -s dist -l 5173"
    ports:
      - "5173:5173"
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:8080/api

  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: luxe-migrate
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/luxe_commerce
    command: sh -c "npx prisma migrate deploy"
    profiles:
      - migrate

volumes:
  luxe_pgdata:
